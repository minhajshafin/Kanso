# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

general {
    col.active_border = rgba(43464Eee)
    col.inactive_border = rgb(090E13)
}

animations {
    enabled = yes

    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softSnap, 0.2, 0.8, 0.2, 1

    # Window animations are now disabled (set to 0)
    animation = windows, 0, 3, easeOutExpo, popin 80%
    animation = windowsOut, 0, 3, easeOutExpo, popin 80%
    
    # Fading effects for UI elements
    animation = fadeIn, 1, 2, softSnap
    animation = fadeOut, 1, 2, softSnap
    
    # Workspace slide animations remain enabled (set to 1)
    animation = workspaces, 1, 4, softSnap, slide
    
    animation = layers, 1, 3, softSnap, fade
}