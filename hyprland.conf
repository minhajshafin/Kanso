# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

general {
    col.active_border = rgb(8a9a7b)
    gaps_in = 4
    gaps_out = 5
}

animations {
    enabled = yes

    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softSnap, 0.2, 0.8, 0.2, 1

    animation = windows, 1, 2, easeOutExpo, popin 80%
    animation = windowsOut, 1, 2, easeOutExpo, popin 80%
    
    animation = fadeIn, 1, 1.5, softSnap
    animation = fadeOut, 1, 1.5, softSnap
    
    animation = workspaces, 1, 2.5, softSnap, slide
    animation = layers, 1, 2, softSnap, fade
}